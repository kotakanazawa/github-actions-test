name: discussion notification
on:
  discussion:
    types: [created]
  discussion_comment:
    types: [created]
jobs:
  discussion_created:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Send notification to slack
        id: slack
        uses: slackapi/slack-github-action@v1.16.0
        with:
          channel-id: '#random'
          payload: |
            {
              "text": "${{ github.event.discussion.title }}\n\n${{ github.event.discussion.html_url }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status }}\n\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}"
                  }
                },
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
